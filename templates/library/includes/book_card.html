<!-- Book Card Component - Reusable across all pages -->
<a href="{{ book.get_absolute_url }}" class="book-card group bg-white rounded-2xl overflow-hidden border border-gray-100 hover:border-emerald-200 shadow-sm" id="book-card-{{ book.slug }}">
    <!-- Cover Image -->
    <div class="relative aspect-[3/4] bg-gradient-to-br from-emerald-100 to-teal-50 overflow-hidden">
        {% if book.cover_image %}
            <img src="{{ book.cover_image.url }}"
                 alt="{{ book.title }}"
                 class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-500"
                 loading="lazy">
        {% else %}
            <!-- Default cover design -->
            <div class="w-full h-full flex flex-col items-center justify-center p-6 bg-gradient-to-br from-emerald-700 to-teal-800 islamic-pattern">
                <svg class="w-12 h-12 text-emerald-200/50 mb-3" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                </svg>
                <p class="text-white/90 font-display font-semibold text-center text-sm leading-tight line-clamp-3">{{ book.title }}</p>
                <p class="text-emerald-200/60 text-xs mt-2 text-center">{{ book.scholar.name }}</p>
            </div>
        {% endif %}

        <!-- Category badge -->
        <div class="absolute top-3 left-3">
            <span class="px-2.5 py-1 bg-white/90 backdrop-blur-sm text-emerald-700 text-xs font-semibold rounded-lg shadow-sm">
                {{ book.category.name }}
            </span>
        </div>

        <!-- Language badge -->
        <div class="absolute top-3 right-3">
            <span class="px-2.5 py-1 bg-emerald-600/90 backdrop-blur-sm text-white text-xs font-medium rounded-lg">
                {{ book.language.name }}
            </span>
        </div>
    </div>

    <!-- Book Info -->
    <div class="p-4 lg:p-5">
        <h3 class="font-display font-semibold text-gray-900 group-hover:text-emerald-700 transition-colors line-clamp-2 mb-1.5 leading-snug">
            {{ book.title }}
        </h3>
        <p class="text-sm text-gray-500 mb-3 flex items-center gap-1.5">
            <svg class="w-3.5 h-3.5 text-gray-400 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path>
            </svg>
            <span class="truncate">{{ book.scholar.name }}</span>
        </p>

        <!-- Stats -->
        <div class="flex items-center gap-4 text-xs text-gray-400">
            <span class="flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path>
                </svg>
                {{ book.views }}
            </span>
            <span class="flex items-center gap-1">
                <svg class="w-3.5 h-3.5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path>
                </svg>
                {{ book.downloads }}
            </span>
        </div>
    </div>
</a>
