<!-- Book Card Component - Reusable across all pages -->
<div class="group bg-white rounded-2xl overflow-hidden border border-gray-100 hover:border-emerald-500 shadow-sm hover:shadow-xl transition-all duration-300" id="book-card-{{ book.slug }}">
    <a href="{{ book.get_absolute_url }}">
        <!-- Cover Image Container -->
        <div class="relative aspect-[3/4] overflow-hidden bg-gray-100">
            {% if book.cover_image %}
                <img src="{{ book.cover_image.url }}"
                     alt="{{ book.title }}"
                     class="w-full h-full object-cover group-hover:scale-105 transition-transform duration-700"
                     loading="lazy">
            {% else %}
                <!-- Modern Default Cover -->
                <div class="w-full h-full flex flex-col items-center justify-center p-6 bg-[#064e3b] islamic-pattern relative">
                    <!-- Decorative overlay -->
                    <div class="absolute inset-0 bg-gradient-to-br from-black/20 to-transparent"></div>
                    
                    <svg class="w-12 h-12 text-emerald-400 opacity-30 mb-4 relative z-10" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253"></path>
                    </svg>
                    
                    <p class="text-white font-display font-bold text-center text-sm leading-tight line-clamp-4 relative z-10 px-2 group-hover:scale-105 transition-transform">
                        {{ book.title }}
                    </p>
                    
                    <div class="mt-4 w-8 h-1 bg-emerald-500/50 rounded-full relative z-10"></div>
                </div>
            {% endif %}

            <!-- Category badges (Floating) -->
            <div class="absolute top-3 left-3 flex flex-col gap-2 z-20">
                <span class="px-2.5 py-1 bg-white/95 backdrop-blur-md text-emerald-700 text-[10px] font-bold uppercase tracking-wider rounded-lg shadow-sm border border-emerald-50/50">
                    {{ book.category.name }}
                </span>
            </div>

            <!-- Stats overlay (Appears on hover) -->
            <div class="absolute inset-0 bg-emerald-950/60 opacity-0 group-hover:opacity-100 transition-opacity duration-300 flex items-center justify-center gap-6 z-10 backdrop-blur-[2px]">
                <div class="flex flex-col items-center text-white">
                    <svg class="w-5 h-5 mb-1 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z"></path></svg>
                    <span class="text-xs font-bold">{{ book.views|default:0 }}</span>
                </div>
                <div class="flex flex-col items-center text-white">
                    <svg class="w-5 h-5 mb-1 text-emerald-400" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"></path></svg>
                    <span class="text-xs font-bold">{{ book.downloads|default:0 }}</span>
                </div>
            </div>
        </div>
    </a>

    <!-- Book Details -->
    <div class="p-5">
        <a href="{{ book.get_absolute_url }}" class="block group/title">
            <h3 class="font-display font-bold text-gray-900 group-hover/title:text-emerald-700 transition-colors line-clamp-2 mb-2 leading-snug min-h-[2.8rem]">
                {{ book.title }}
            </h3>
        </a>
        
        <div class="flex items-center justify-between mt-4 pt-4 border-t border-gray-50">
            <div class="flex items-center gap-2 min-w-0">
                <div class="w-7 h-7 bg-emerald-50 rounded-lg flex items-center justify-center shrink-0">
                    <svg class="w-4 h-4 text-emerald-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"></path></svg>
                </div>
                <span class="text-xs font-semibold text-gray-500 truncate">{{ book.scholar.name }}</span>
            </div>
            
            <span class="text-[10px] font-bold text-gray-400 uppercase tracking-widest">{{ book.language.name }}</span>
        </div>
    </div>
</div>
